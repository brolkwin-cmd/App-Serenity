<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERENITY</title>
    <link rel="stylesheet" href="/styles.css">

</head>

<body>

    
    <header class="header">
  <nav class="header-nav">
    <a href="index.html" class="logo" aria-label="SERENITY - Inicio">
      <span class="logo-mark">◈</span>
      <span class="logo-name">Serenity</span>
    </a>
    <a href="contacto.html" class="panic-btn" aria-label="Contacto y apoyo de emergencia">
      🆘 <span>Necesito ayuda ahora</span>
    </a>
  </nav>
  
  <div class="ingreso-bar">
    <form action="index.html" method="get" aria-label="Registro de sesión">
      <label class="checkin-label" for="codigo">Registro de sesión:</label>
      <input
        type="text" id="codigo" name="codigo"
        class="checkin-input"
        placeholder="Código de colaborador"
        autocomplete="off" maxlength="20"
      />
      <select id="area" name="area" class="checkin-select" aria-label="Área o departamento">
        <option value="">Área / Departamento</option>
        <option value="ops">Operaciones</option>
        <option value="com">Comercial</option>
        <option value="fin">Finanzas</option>
        <option value="rr">Recursos Humanos</option>
        <option value="tec">Tecnología</option>
        <option value="mkt">Marketing</option>
        <option value="otro">Otra área</option>
      </select>
      <button type="submit" class="checkin-btn">Iniciar sesión →</button>
    </form>
  </div>
</header>


    </header>

    </main>

</body>

</html>
